<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LRS test</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header class="header">
        <a href="./index.html"><h1>LRS by JavaScript</h1></a>
        <h3>LRS MP 64bit for Wasm Worker Test</h3>

        <div>
            <a href="https://github.com/ym28-it/lrs-web-app.git" target="_blank" rel="noopener" title="View on GitHub">
                <img src="./images/github-mark/github-mark.png" alt="GitHub">

            </a>
        </div>
    </header>

    <main class="main">
        <label for="fileInput">Upload Input File:</label>
        <input type="file" id="fileInput">

        <div class="io-wrapper">
            <div id="input">
                <label for="inputArea">Input:</label>
                <textarea id="inputArea" rows="10" cols="50" ></textarea><br>
                <button type="submit" id="runProgram">
                    Submit
                    <span class="tooltip">Ctrl+Enter or Cmd+Enter</span>
                </button>
            </div>

            <div id="output">
                <label for="outputArea">Output:</label>
                <span id="elapsedTime">0 ms</span>
                <textarea id="outputArea" rows="10" cols="50" readonly></textarea>
                <label for="outputFileName">Output File Name InputArea:</label>
                <input type="text" id="outputFileName" placeholder="output.txt"><br>
                <button type="submit" id="downloadOutput">Download Output File</button>
            </div>
        </div>
        
        <div id="loadingIndicator"></div>

        <section id="visualization">
            <h2>Polytope Visualization (up to 3D)</h2>
            <button type="button" id="visualizeButton">Visualize</button>
            <span id="vizMessage"></span>
            <div id="vizContainer"></div>
        </section>
    </main>

    <script src="./lrs-common.js"></script>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="./visualization/visualizer-main.js"></script>
</body>
